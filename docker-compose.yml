version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: backstage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    ports:
      - '5432:5432'
    volumes:
      - backstage_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U backstage']
      interval: 5s
      timeout: 5s
      retries: 10

  backstage:
    image: pewpewlab/backstage:local        # built from packages/backend/Dockerfile
    container_name: backstage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '7007:7007'
    environment:
      # PostgreSQL connection — "postgres" is the service name above, Docker DNS resolves it
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      # Optional — set your GitHub token for catalog integrations
      # GITHUB_TOKEN: your_token_here
    # The CMD in the Dockerfile already loads both app-config files.
    # Override here if you want dev-only config (sqlite, no production overrides):
    #   command: ["node", "packages/backend", "--config", "app-config.yaml"]

volumes:
  backstage_pg_data:
